<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" fill="none">
  <!-- AMANA Transfert d'Argent Logo -->
  <!-- Main ellipse -->
  <ellipse cx="250" cy="140" rx="170" ry="85" stroke="#1a8a3a" stroke-width="10" fill="none"/>
  <!-- Top-right arrow (going right) -->
  <path d="M380,80 C400,60 410,55 420,55" stroke="#1a8a3a" stroke-width="10" fill="none" stroke-linecap="round"/>
  <polygon points="418,42 430,55 415,62" fill="#1a8a3a"/>
  <!-- Bottom-left arrow (going left) -->
  <path d="M120,200 C100,220 90,225 80,225" stroke="#1a8a3a" stroke-width="10" fill="none" stroke-linecap="round"/>
  <polygon points="82,238 70,225 85,218" fill="#1a8a3a"/>
  <!-- AMANA text -->
  <text x="250" y="160" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="72" fill="#e8711a" text-anchor="middle" letter-spacing="6">AMANA</text>
  <!-- Subtitle -->
  <text x="250" y="275" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="32" fill="#e8711a" text-anchor="middle" letter-spacing="3">TRANSFERT D'ARGENT</text>
</svg>