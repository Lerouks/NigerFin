<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80">
  <!-- American Express -->
  <g transform="translate(0,0)">
    <defs>
      <linearGradient id="amex-bg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#6cb4e8"/>
        <stop offset="100%" stop-color="#2b7cc9"/>
      </linearGradient>
    </defs>
    <rect width="100" height="80" rx="4" fill="url(#amex-bg)"/>
    <text x="50" y="38" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="14" fill="#ffffff" letter-spacing="0.5">AMERICAN</text>
    <text x="50" y="56" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="14" fill="#ffffff" letter-spacing="0.5">EXPRESS</text>
  </g>
  <!-- Visa -->
  <g transform="translate(125,0)">
    <text x="50" y="52" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="38" fill="#1a1f71" font-style="italic" letter-spacing="-1">VISA</text>
  </g>
  <!-- Mastercard -->
  <g transform="translate(255,8)">
    <circle cx="25" cy="32" r="25" fill="#eb001b"/>
    <circle cx="55" cy="32" r="25" fill="#f79e1b"/>
    <path d="M40,11.5 a25,25 0 0,1 0,41 a25,25 0 0,1 0,-41" fill="#ff5f00"/>
  </g>
</svg>