<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#000000"/>
  <!-- NFI Report Pyramid Logo - detailed version matching the actual logo -->
  <!-- Main outer pyramid -->
  <path d="M256 60 L430 400 H82 Z" stroke="white" stroke-width="4" fill="none"/>
  <!-- Inner parallel lines creating the layered effect -->
  <path d="M256 85 L410 385 H102 Z" stroke="white" stroke-width="3" fill="none" opacity="0.95"/>
  <path d="M256 105 L392 372 H120 Z" stroke="white" stroke-width="3" fill="none" opacity="0.9"/>
  <path d="M256 125 L374 359 H138 Z" stroke="white" stroke-width="2.5" fill="none" opacity="0.85"/>
  <path d="M256 145 L356 346 H156 Z" stroke="white" stroke-width="2.5" fill="none" opacity="0.8"/>
  <path d="M256 165 L338 333 H174 Z" stroke="white" stroke-width="2" fill="none" opacity="0.75"/>
  <path d="M256 185 L320 320 H192 Z" stroke="white" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M256 205 L305 310 H207 Z" stroke="white" stroke-width="2" fill="none" opacity="0.65"/>
  <path d="M256 225 L290 300 H222 Z" stroke="white" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Horizontal chevron lines (V-shapes pointing up) -->
  <line x1="120" y1="340" x2="256" y2="270" stroke="white" stroke-width="2" opacity="0.7"/>
  <line x1="392" y1="340" x2="256" y2="270" stroke="white" stroke-width="2" opacity="0.7"/>
  <line x1="140" y1="320" x2="256" y2="250" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="372" y1="320" x2="256" y2="250" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <!-- Door/entrance at base -->
  <rect x="228" y="350" width="56" height="50" stroke="white" stroke-width="2.5" fill="none" opacity="0.85"/>
</svg>