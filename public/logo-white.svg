<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- NFI Report Pyramid Logo - Light/Gray version -->
  <defs>
    <linearGradient id="gray-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#999999"/>
      <stop offset="50%" stop-color="#666666"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
  </defs>
  <!-- Outer pyramid -->
  <path d="M100 15 L180 175 H20 Z" stroke="url(#gray-grad)" stroke-width="1.8" fill="none"/>
  <!-- Inner nested pyramids creating chevron effect -->
  <path d="M100 28 L170 168 H30 Z" stroke="url(#gray-grad)" stroke-width="1.5" fill="none" opacity="0.9"/>
  <path d="M100 38 L162 162 H38 Z" stroke="url(#gray-grad)" stroke-width="1.5" fill="none" opacity="0.85"/>
  <path d="M100 48 L154 156 H46 Z" stroke="url(#gray-grad)" stroke-width="1.3" fill="none" opacity="0.8"/>
  <path d="M100 58 L146 150 H54 Z" stroke="url(#gray-grad)" stroke-width="1.3" fill="none" opacity="0.75"/>
  <path d="M100 68 L138 144 H62 Z" stroke="url(#gray-grad)" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M100 78 L130 138 H70 Z" stroke="url(#gray-grad)" stroke-width="1.2" fill="none" opacity="0.65"/>
  <path d="M100 88 L122 132 H78 Z" stroke="url(#gray-grad)" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M100 98 L114 126 H86 Z" stroke="url(#gray-grad)" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Door/entrance -->
  <rect x="87" y="142" width="26" height="33" stroke="url(#gray-grad)" stroke-width="1.5" fill="none" opacity="0.8"/>
</svg>