<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 280" fill="none">
  <!-- NITA Transfert d'Argent Logo -->
  <!-- N (dark blue) -->
  <text x="55" y="155" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="120" fill="#0d3b7a">N</text>
  <!-- I (orange) -->
  <text x="140" y="155" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="120" fill="#e8601c">I</text>
  <!-- T (orange) -->
  <text x="175" y="155" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="120" fill="#e8601c">T</text>
  <!-- A (orange) -->
  <text x="250" y="155" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="120" fill="#e8601c">A</text>
  <!-- Curved arrow swoosh from bottom-left to top-right -->
  <path d="M85,170 C120,200 200,195 280,160 Q320,142 345,110" stroke="#0d3b7a" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Arrow head pointing up-right -->
  <polygon points="345,108 338,125 352,118" fill="#0d3b7a"/>
  <!-- Subtitle -->
  <text x="230" y="225" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="30" fill="#0d3b7a" text-anchor="middle" letter-spacing="3">TRANSFERT D'ARGENT</text>
</svg>